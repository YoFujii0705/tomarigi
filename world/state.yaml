season_note: 7月下旬。梅雨明け間近。蒸し暑さ続く。気圧が不安定な時期も終わりに向かう。
shiomi:
- 冬の特別展(テーマ未定)の企画を任されて荷が重い。企画書の締切は8月末
- ミズクラゲの水流調整がようやく安定してきた。気圧の変動を読む目が少しつく
- 後輩が給餌の基本を覚え始めた。判断が難しい日は自分で前にいたい気持ちがある
gonda:
- 営業成績が微妙。気圧が戻ったせいか、お客さんたちも疲れが抜けてきた実感
- 娘(中2)が朝の支度が早くなったような。気のせいかもしれない
- 白湯とストレッチの朝ルーティンは6週間目。梅雨明けまで続ける
uzumaki:
- 実家からのLINEはまだ返していない。でも気圧が戻ると返したくなる気がする
- 夜勤の相方が月末で辞める。一人棚卸しをしていて、POPを見直したくなった
- からあげ棒の販促POPは自分なりに確認したくなるレベル。誰も気づかない工夫
muguruma:
- 腰の調子が悪い。中央道で気圧のせいだと思った。湿布でごまかしている
- 免許を返納した父親からの電話は続いている。返すのが習慣になってきた
- 名古屋−仙台の往復は今週で終わり。朝四時半の霧が印象的だった
harugasumi:
- 茄子を塩漬けにした。瓶に詰めて重石を乗せ、時間が働くのを待っている。十二本採れた
- 昔の教え子からの招待状。返事の手紙が、ゆっくり形になるのを待っている
- スマホの文字を大きくしてから、世界が変わった。漬物の時間も見えるようになった
togakushi:
- 紀要論文(死者への譲状について)。起請文の非宛性が形式を純化させるという軸で通りそう。締切は9月頭
- 起請文の写本を見ていて、墨の濃淡が一定でないことに気づいた。執筆環境の問題かもしれない
- 乗換駅のハクセキレイ。気圧が戻った時期には姿が消えていた。今朝は見なかった
