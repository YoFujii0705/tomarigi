# 各住人の「進行中の生活」。週次ジョブが自動更新する。
# 神様(あなた)が手で書き換えてよい。一行足すと事件が起きる。
season_note: "7月中旬。梅雨明け前後。蒸し暑い。"

shiomi:
  - 冬の特別展(テーマ未定)の企画を任されて荷が重い。企画書の締切は8月末
  - ミズクラゲの新しい水槽の水流調整がうまくいっていない
  - 後輩がひとり入ってきた。教えるのは嫌いではない

gonda:
  - 営業成績が微妙で、管理職打診に揺れている(現場を離れたくない気持ちがある)
  - 娘(中2)が最近口をきいてくれない。原因は不明
  - 白湯とストレッチの朝ルーティンは3週間目。眠い

uzumaki:
  - 実家から「いつまでフリーターなのか」というLINEが週1で来る。まだ返していない
  - 夜勤の相方が今月で辞める。次の相方は未定
  - 新作のからあげ棒の販促POPを任されて、実はちょっと楽しい

muguruma:
  - 腰の調子が良くない。湿布でごまかしている
  - 免許を返納した父親から、用件のない電話が増えた
  - 今週は名古屋−仙台の往復が多い

harugasumi:
  - 茄子が採れすぎている。配り先を探している
  - 昔の教え子から結婚式の招待状が届いた。返事をまだ書けていない
  - スマホの文字を大きくする方法を覚えた。世界が変わった

togakushi:
  - 紀要論文(死者への譲状について)の締切が9月頭。まだ構成が固まらない
  - 来年度、掛け持ち先のひとつでコマが減るかもしれないという話を聞いた
  - 乗換駅のハクセキレイが最近二羽になった
