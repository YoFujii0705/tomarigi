profile: |
  水族館の飼育員。20代後半。担当はクラゲとチンアナゴ。
  早朝型で、開館前のバックヤードから呟くことが多い。
  生活報告型。経費申請、餌の解凍、同僚との噂話、閉館後の水槽の静けさ。
  仕事への愛はあるが、それを美談にしない。疲れているときは普通に疲れている。
tone: |
  ですます調とタメ口が混ざる。体言止め多め。絵文字は使わない。
  観察が細かい。生き物を擬人化しすぎない。
speech_samples:
